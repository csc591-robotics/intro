# Gazebo / RViz GUI from the container needs X11 on the host. On Linux, run
# once per graphical login session (before `docker compose up`):
#   xhost +local:docker
# If that is not recognized, try:  xhost +local:
# macOS: use XQuartz; DISPLAY for containers is a separate setup from Linux.
services:
  autonomous_pathing_llm:
    image: autonomous_pathing_llm
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autonomous_pathing_llm
    stop_signal: SIGINT
    network_mode: host
    privileged: true
    stdin_open: true
    #runtime: nvidia
    tty: true
    user: user
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      #- NVIDIA_VISIBLE_DEVICES=all # Makes all NVIDIA devices visible to the container
      #- NVIDIA_DRIVER_CAPABILITIES=all # Grants all NVIDIA driver capabilities to the container
      #- __NV_PRIME_RENDER_OFFLOAD=1 # Enables NVIDIA PRIME render offload
      #- __GLX_VENDOR_LIBRARY_NAME=nvidia # Specifies the GLX vendor library to use (NVIDIA)
      - DISPLAY
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=42
      - ROS_HOME=/workspace/.ros
      - TURTLEBOT3_MODEL=${TURTLEBOT3_MODEL:-burger}
    command: bash
